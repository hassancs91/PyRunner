{% extends "base.html" %}

{% block title %}Forgot Password - PyRunner{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-12rem)] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-info/10 rounded-2xl grid place-items-center mx-auto mb-6">
                <svg class="w-8 h-8 text-info" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <h1 class="text-2xl font-semibold tracking-tight text-text mb-2">Forgot password</h1>
            <p class="text-muted">Enter your email to receive a password reset link</p>
        </div>

        <div class="bg-panel border border-line rounded-2xl p-8">
            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label for="email" class="block text-[13px] font-medium text-muted mb-1.5">Email address</label>
                    <input type="email" id="email" name="email" required autocomplete="email" autofocus placeholder="you@example.com" class="w-full px-3.5 py-2.5 bg-ink border border-line rounded-lg text-text text-sm placeholder-faint/60 focus:outline-none focus:ring-2 focus:ring-ok/30 focus:border-ok/60 transition-colors">
                </div>
                <button type="submit" class="w-full py-3 px-4 bg-ok text-ink font-semibold rounded-lg hover:opacity-90 transition">Send reset link</button>
            </form>
            <div class="mt-6 text-center">
                <a href="{% url 'auth:login' %}" class="text-sm text-muted hover:text-text transition-colors">Back to sign in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
