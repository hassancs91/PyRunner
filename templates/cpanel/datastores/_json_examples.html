<div class="rounded-lg border border-line-soft bg-panel-hi/40 p-4">
    <h4 class="text-sm font-medium text-text mb-3">Valid JSON examples</h4>
    <div class="grid grid-cols-2 gap-3 text-sm font-mono">
        <div><p class="text-xs text-faint mb-1">String</p><code class="text-info">"hello world"</code></div>
        <div><p class="text-xs text-faint mb-1">Number</p><code class="text-info">42</code> or <code class="text-info">3.14</code></div>
        <div><p class="text-xs text-faint mb-1">Boolean</p><code class="text-info">true</code> or <code class="text-info">false</code></div>
        <div><p class="text-xs text-faint mb-1">Null</p><code class="text-info">null</code></div>
        <div><p class="text-xs text-faint mb-1">Array</p><code class="text-info">[1, 2, 3]</code></div>
        <div><p class="text-xs text-faint mb-1">Object</p><code class="text-info">{"key": "value"}</code></div>
