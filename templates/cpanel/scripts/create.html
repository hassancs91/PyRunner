{% extends "base.html" %}

{% block title %}Create Script - PyRunner{% endblock %}

{% block content %}
<div class="flex">
    {% include "cpanel/_sidebar.html" %}

    <div class="flex-1 p-8">
        <!-- Header -->
        <div class="mb-8">
            <nav class="flex items-center space-x-2 text-sm text-code-muted mb-4">
                <a href="{% url 'cpanel:script_list' %}" class="hover:text-code-accent">Scripts</a>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
                <span class="text-code-text">Create</span>
            </nav>
            <h1 class="text-2xl font-bold text-code-text">Create New Script</h1>
            <p class="text-code-muted">Write and configure a new Python script</p>
        </div>

        <!-- Form -->
        <div class="bg-code-surface border border-code-border rounded-xl p-6 max-w-3xl">
            <form method="post">
                {% csrf_token %}

                {% include "cpanel/scripts/_form.html" %}

                <!-- Actions -->
                <div class="flex items-center justify-end space-x-4 mt-8 pt-6 border-t border-code-border">
                    <a href="{% url 'cpanel:script_list' %}"
                       class="px-4 py-2 bg-code-surface border border-code-border hover:border-code-accent text-code-text rounded-lg transition-colors">
                        Cancel
                    </a>
                    <button type="submit"
                            class="px-4 py-2 bg-code-accent hover:bg-code-accent/90 text-white font-semibold rounded-lg transition-colors">
                        Create Script
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
